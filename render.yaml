services:
  - type: web
    name: gsif-webapp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --timeout 120 --keep-alive 5 app:app
    healthCheckPath: /api/health
    envVars:
      - key: SITE_URL
        value: https://everysoulhasamap.org
      - key: GSIF_SECRET_KEY
        generateValue: true
      # ── Email SMTP (Gmail) ────────────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: klara.aromaterapia@gmail.com
      - key: SMTP_PASS
        sync: false   # setează manual în Render Dashboard → Environment
      # ── Supabase Storage ──────────────────────────
      - key: SUPABASE_URL
        sync: false   # ex: https://xxxx.supabase.co
      - key: SUPABASE_KEY
        sync: false   # anon/public key din Supabase Settings → API
      # ── n8n Cloud Webhook ─────────────────────────
      - key: N8N_WEBHOOK_URL
        value: https://aumatizari.app.n8n.cloud/webhook/gsif-certificate
      # ── Stripe ───────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false   # setează manual în Render Dashboard: sk_live_... sau sk_test_...
      - key: STRIPE_PRICE_EUR
        value: "20"
      # ── Counter seed ──────────────────────────────
      - key: COUNTER_SEED
        value: "1247"
      # ── Admin & Alerting ─────────────────────
      - key: ADMIN_KEY
        sync: false   # setează manual în Render Dashboard (ex: gsif-admin-2026)
      - key: TELEGRAM_BOT_TOKEN
        sync: false   # token bot Telegram pentru alerte plăți eșuate
      - key: TELEGRAM_ADMIN_CHAT_ID
        value: "6148595336"
      # ── Stripe Webhook ───────────────────────
      - key: STRIPE_WEBHOOK_SECRET
        sync: false   # din Stripe Dashboard → Developers → Webhooks → Signing secret
